version: '3.9'

services:
  # Database
  seep-db:
    image: postgres:15-alpine
    container_name: seep-db
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=seep_user
      - POSTGRES_PASSWORD=seep_pass
      - POSTGRES_DB=seep_db
    volumes:
      - seep_pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U seep_user -d seep_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend server
  seep-server:
    build:
      context: .
      dockerfile: Dockerfile.server
    container_name: seep-server
    ports:
      - "3002:3000"
    environment:
      - NODE_ENV=production
      - JWT_SECRET=${JWT_SECRET:-seep-secret-key-change-in-production}
      - PORT=3000
      - DATABASE_URL=postgres://seep_user:seep_pass@seep-db:5432/seep_db
    depends_on:
      seep-db:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Frontend - serves static files via nginx
  seep-client:
    build:
      context: .
      dockerfile: Dockerfile.client
    container_name: seep-client
    ports:
      - "5273:80"
    restart: unless-stopped
    depends_on:
      seep-server:
        condition: service_healthy

volumes:
  seep_pgdata:

networks:
  default:
    name: seep-network