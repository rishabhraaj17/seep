version: '3.9'
name: seep

services:
  # Database
  seep-db:
    image: postgres:15-alpine
    container_name: seep-db
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=seep_user
      - POSTGRES_PASSWORD=seep_pass
      - POSTGRES_DB=seep_db
    volumes:
      - seep_pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U seep_user -d seep_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend server
  seep-server:
    build:
      context: .
      dockerfile: Dockerfile.server
    container_name: seep-server
    ports:
      - "3002:3000"
    environment:
      - NODE_ENV=production
      - JWT_SECRET=${JWT_SECRET:-seep-secret-key-change-in-production}
      - PORT=3000
      - DATABASE_URL=postgres://seep_user:seep_pass@seep-db:5432/seep_db
      - CLIENT_ORIGIN=http://localhost:5273
      - ADMIN_USERNAME=${ADMIN_USERNAME:-}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-}
    depends_on:
      seep-db:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Frontend - serves static files via nginx
  seep-client:
    build:
      context: .
      dockerfile: Dockerfile.client
    container_name: seep-client
    ports:
      - "5273:80"
    restart: unless-stopped
    depends_on:
      seep-server:
        condition: service_healthy

  # Log viewer — streams container logs (server gameplay/auth events, client, db) in a web UI.
  # Bound to localhost only; this is an operator tool, not part of the app's own RBAC.
  dozzle:
    image: amir20/dozzle:latest
    container_name: seep-dozzle
    ports:
      - "127.0.0.1:8888:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      - DOZZLE_NO_ANALYTICS=true
      - DOZZLE_FILTER=label=com.docker.compose.project=seep
    restart: unless-stopped

volumes:
  seep_pgdata:

networks:
  default:
    name: seep-network