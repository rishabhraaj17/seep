version: '3.9'

services:
  # Backend server
  seep-server:
    build:
      context: .
      dockerfile: Dockerfile.server
    container_name: seep-server
    ports:
      - "3002:3000"
    environment:
      - NODE_ENV=production
      - JWT_SECRET=${JWT_SECRET:-seep-secret-key-change-in-production}
      - PORT=3000
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Frontend - serves static files via nginx
  seep-client:
    build:
      context: .
      dockerfile: Dockerfile.client
    container_name: seep-client
    ports:
      - "5273:80"
    restart: unless-stopped
    depends_on:
      seep-server:
        condition: service_healthy

networks:
  default:
    name: seep-network